# File: .github/workflows/build-wslg.yml
name: Build WSLg System Distro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance(检查服务器性能)
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息："
          echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 修复：先清理冲突的包，再安装 Docker
      - name: Install dependencies (fixed)
        run: |
          sudo apt-get update
          # 移除可能冲突的 containerd 包
          sudo apt-get remove -y containerd containerd.io docker docker-engine docker.io || true
          # 清理 Docker 相关残留
          sudo rm -rf /var/lib/docker
          sudo rm -rf /var/lib/containerd
          # 安装必要的依赖
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            lsb-release \
            golang-go \
            jq \
            make \
            git

      # 使用官方 Docker 安装脚本（更可靠）
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          # 将当前用户添加到 docker 组
          sudo usermod -aG docker $USER

      - name: Clone vendor repositories
        run: |
          mkdir -p wslg/vendor
          # FreeRDP (working 分支)
          git clone --branch working \
            https://github.com/microsoft/FreeRDP-mirror.git \
            wslg/vendor/FreeRDP
          # Weston (working 分支)
          git clone --branch working \
            https://github.com/microsoft/weston-mirror.git \
            wslg/vendor/weston
          # PulseAudio (working 分支)
          git clone --branch working \
            https://github.com/microsoft/PulseAudio-mirror.git \
            wslg/vendor/pulseaudio
          # DirectX-Headers (v1.608.0 标签)
          git clone --branch v1.608.0 \
            https://github.com/microsoft/DirectX-Headers.git \
            wslg/vendor/DirectX-Headers-1.0
          # Mesa (mesa-23.1.0 分支)
          git clone --branch mesa-23.1.0 \
            https://gitlab.freedesktop.org/mesa/mesa.git \
            wslg/vendor/mesa

      - name: Apply Weston patch (Ctrl+Alt+Backspace fullscreen)
        run: |
          cd wslg/vendor/weston
          cat << 'EOF' | patch -p1
          diff --git a/rdprail-shell/shell.c b/rdprail-shell/shell.c
          index 75fc8367..373bb016 100644
          --- a/rdprail-shell/shell.c
          +++ b/rdprail-shell/shell.c
          @@ -4594,6 +4594,10 @@ shell_add_bindings(struct weston_compositor *ec, struct desktop_shell *shell)
                                                    MODIFIER_CTRL | MODIFIER_ALT,
                                                    terminate_binding, ec);
          
          +       weston_compositor_add_key_binding(ec, KEY_BACKSPACE,
          +                                        MODIFIER_CTRL | MODIFIER_ALT,
          +                                        fullscreen_binding, ec);
          +
                if (shell->allow_alt_f4_to_close_app)
                        weston_compositor_add_key_binding(ec, KEY_F4,
                                                  MODIFIER_ALT,
          EOF
          # 验证补丁
          git diff --exit-code || echo "Patch applied"

      - name: Start Docker daemon
        run: |
          sudo systemctl unmask docker
          sudo systemctl start docker
          # 等待 Docker 就绪
          for i in {1..30}; do
            if docker info > /dev/null 2>&1; then
              echo "Docker is ready"
              break
            fi
            sleep 2
          done

      # 验证 Docker 能正常工作
      - name: Verify Docker
        run: docker run hello-world

      - name: Build system distro
        working-directory: ./wslg
        run: |
          chmod +x build-and-export.sh
          ./build-and-export.sh

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslg-system-vhd
          path: wslg/system_x64.vhd
          retention-days: 30
