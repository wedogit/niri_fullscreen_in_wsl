# File: .github/workflows/build-wslg.yml
name: Build WSLg System Distro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check Server Performance(检查服务器性能)
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息："
          echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      # 1. 检出代码（包含子模块）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 2. 安装依赖
      - name: Install dependencies (fixed)
        run: |
          sudo apt-get update
          # 移除可能冲突的 containerd 包
          sudo apt-get remove -y containerd containerd.io docker docker-engine docker.io || true
          # 清理 Docker 相关残留
          sudo rm -rf /var/lib/docker
          sudo rm -rf /var/lib/containerd
          # 安装必要的依赖
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            lsb-release \
            golang-go \
            jq \
            make \
            git \
            dos2unix

      # 3. 安装 Docker
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER

      # 4. 克隆 vendor 仓库
      - name: Clone vendor repositories
        run: |
          git clone https://github.com/microsoft/wslg wslg
          mkdir -p wslg/vendor
          # FreeRDP (working 分支)
          git clone --branch working \
            https://github.com/microsoft/FreeRDP-mirror.git \
            wslg/vendor/FreeRDP
          # Weston (working 分支)
          git clone --branch working \
            https://github.com/microsoft/weston-mirror.git \
            wslg/vendor/weston
          # PulseAudio (working 分支)
          git clone --branch working \
            https://github.com/microsoft/PulseAudio-mirror.git \
            wslg/vendor/pulseaudio
          # DirectX-Headers (v1.608.0 标签)
          git clone --branch v1.608.0 \
            https://github.com/microsoft/DirectX-Headers.git \
            wslg/vendor/DirectX-Headers-1.0
          # Mesa (mesa-23.1.0 分支)
          git clone --branch mesa-23.1.0 \
            https://gitlab.freedesktop.org/mesa/mesa.git \
            wslg/vendor/mesa

      # 5. 替换 Weston shell.c 文件 ⭐️ 关键修改
      - name: Replace Weston shell.c with pre-patched version
        run: |
          # 直接从您的仓库下载已修改的 shell.c
          cp shell.c wslg/vendor/weston/rdprail-shell/shell.c
          
          # 确保文件格式正确
          #dos2unix wslg/vendor/weston/rdprail-shell/shell.c
          
          # 验证修改已应用
         # if grep -q "KEY_BACKSPACE, ec" wslg/vendor/weston/rdprail-shell/shell.c; then
          #  echo "✓ Shell.c patched successfully"
          #else
          #  echo "Error: Patch verification failed!"
          #  exit 1
         # fi

      # 6. 启动 Docker 服务
      - name: Start Docker daemon
        run: |
          sudo systemctl unmask docker
          sudo systemctl start docker
          # 等待 Docker 就绪
          for i in {1..30}; do
            if docker info > /dev/null 2>&1; then
              echo "Docker is ready"
              break
            fi
            sleep 2
          done

      # 7. 验证 Docker 能正常工作
      - name: Verify Docker
        run:  |
            docker run hello-world
            pwd

      # 8. 构建系统发行版
      - name: Build system distro
        
        run: |
          cd wslg
          chmod +x build-and-export.sh
          ./build-and-export.sh

      # 9. 上传构建产物
      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslg-system-vhd
          path: wslg/system_x64.vhd
          retention-days: 30
